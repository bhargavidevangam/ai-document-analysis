spring.application.name=ai-document-analysis


# ===============================
# Database Configuration
# ===============================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/courtdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}

# ===============================
# Server Configuration
# ===============================
server.port=8008
server.servlet.context-path=/aidocs

# Return clean API errors without stack traces
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-message=always
server.error.include-binding-errors=never

# OpenAPI/Swagger endpoints (served under /casesai)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Gemini AI configuration (kept empty by default and read from environment variable)
gemini.api.key=${GEMINI_API_KEY}
gemini.model=${GEMINI_MODEL}

spring.devtools.restart.enabled=true
ocr.tesseract.command=${TESSERACT_CMD:/usr/bin/tesseract}
ocr.tesseract.language=eng